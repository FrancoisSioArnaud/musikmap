rules:
  - id: python-no-broad-exception
    message: "Évite except Exception:. Capture une erreur précise."
    severity: WARNING
    languages: [python]
    patterns:
      - pattern-either:
          - pattern: |
              try:
                ...
              except Exception:
                ...
          - pattern: |
              try:
                ...
              except Exception as $ERR:
                ...

  - id: frontend-no-direct-localstorage
    message: "Passe par les wrappers storage du projet au lieu d’utiliser localStorage en direct."
    severity: WARNING
    languages: [javascript]
    paths:
      exclude:
        - "**/frontend/src/components/Utils/mmStorage.js"
        - "**/frontend/src/components/Utils/pageStateStorage.js"
        - "**/frontend/src/components/Flowbox/runtime/flowboxSessionStorage.js"
        - "**/frontend/src/**/*.test.js"
        - "**/frontend/static/frontend/**"
    patterns:
      - pattern-either:
          - pattern: localStorage.getItem(...)
          - pattern: localStorage.setItem(...)
          - pattern: localStorage.removeItem(...)
          - pattern: window.localStorage.getItem(...)
          - pattern: window.localStorage.setItem(...)
          - pattern: window.localStorage.removeItem(...)

  - id: frontend-no-location-reload
    message: "Évite location.reload(); garde la logique dans React/router."
    severity: ERROR
    languages: [javascript]
    paths:
      exclude:
        - "**/frontend/static/frontend/**"
    patterns:
      - pattern-either:
          - pattern: location.reload(...)
          - pattern: window.location.reload(...)
