{% extends "admin/base_site.html" %}

{% block content %}
  <div id="content-main">
    <h1>{{ title }}</h1>
    <p>Crée jusqu’à 500 stickers en une seule opération pour un client donné.</p>
    <form method="post" novalidate>
      {% csrf_token %}
      <fieldset class="module aligned">
        {{ form.as_p }}
      </fieldset>
      <div class="submit-row">
        <input type="submit" class="default" value="Créer le lot">
        <a href="{% url 'admin:box_management_sticker_changelist' %}" class="button cancel-link">Retour</a>
      </div>
    </form>
  </div>
{% endblock %}
